name: Java CI/CD with Maven, Docker & K8s

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_HUB_REGISTRY: docker.io
  DOCKER_HUB_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/sample-springboot-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      run: mvn -B clean package
      working-directory: ./java-maven-sonar-argocd-helm-k8s/spring-boot-app

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: maven-jar
        path: ./java-maven-sonar-argocd-helm-k8s/spring-boot-app/target/*.jar
        retention-days: 5

  build-and-push-image:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    # NEW STEP: Safely lowercases your repository path to satisfy strict container registry standards
    - name: Convert repository name to lowercase
      id: downcase
      run: |
        echo "image_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: maven-jar
        path: ./java-maven-sonar-argocd-helm-k8s/spring-boot-app/target/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ env.DOCKER_HUB_REGISTRY }}
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Extract metadata (tags, labels) for GHCR
      id: meta-ghcr
      uses: docker/metadata-action@v5
      with:
        # FIXED: Feeds the safe lowercase repository string path here
        images: ${{ env.REGISTRY }}/${{ steps.downcase.outputs.image_lower }}
        tags: |
          type=sha,prefix=main-,format=short

    - name: Extract metadata (tags, labels) for Docker Hub
      id: meta-docker
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKER_HUB_REGISTRY }}/${{ env.DOCKER_HUB_IMAGE }}
        tags: |
          type=sha,prefix=main-,format=short

    - name: Build and push to Registries
      uses: docker/build-push-action@v5
      with:
        context: ./java-maven-sonar-argocd-helm-k8s/spring-boot-app
        push: true
        tags: |
          ${{ steps.meta-ghcr.outputs.tags }}
          ${{ steps.meta-docker.outputs.tags }}
        labels: ${{ steps.meta-ghcr.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
  deploy-to-local-cluster:
    needs: build-and-push-image
    runs-on: [self-hosted, Windows]

    steps:
    - name: Set active image in Minikube via Bash
      # FIXED: Swapped 'wsl' with the built-in validated 'bash' engine keyword
      shell: bash
      run: |
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        NEW_TAG="main-${SHORT_SHA}"
        REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        
        echo "🚀 Executing push deployment directly into local Minikube via Bash..."
        echo "Target Tag Version: ${NEW_TAG}"
        
        kubectl set image deployment/spring-boot-app spring-boot-app=ghcr.io/${REPO_NAME}:${NEW_TAG}
        kubectl rollout status deployment/spring-boot-app

